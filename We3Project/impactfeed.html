<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreeHunger | ImpactFeed</title>
    
    <!-- Unified Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      body { padding-top: 80px; } /* Space for fixed navbar */
    </style>
  </head>
  <body>
    <!-- ── NAVBAR (injected by components.js) ── -->
    <div id="nav-placeholder"></div>

    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #666;">
        <div class="text-center">
          <div class="spinner-border text-emerald-600 mb-3" style="color: #10b981;" role="status"></div>
          <div>Loading Feed...</div>
        </div>
      </div>
    </div>

    <!-- ── FOOTER (injected by components.js) ── -->
    <div id="footer-placeholder"></div>

    <!-- Firebase SDK (Compat for components.js) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Components -->
    <script src="js/components.js"></script>
    <script>
      window.addEventListener('load', function() {
        if (typeof FHComponents !== 'undefined') {
          FHComponents.init('impactfeed');
        } else {
          console.error('CRITICAL: FHComponents (components.js) failed to load. Check js/components.js path.');
        }
      });
    </script>

    <!-- React App -->
    <script type="module" src="src/main.tsx"></script>
    <script type="module">
      console.log('Checking main.tsx load...');
    </script>
  </body>
</html>
