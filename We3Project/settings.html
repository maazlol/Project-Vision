<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeHunger | Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/global.css">
    <style>
        .settings-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: none;
            overflow: hidden;
        }
        .avatar-preview-box {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            position: relative;
            background-color: #f3f4f6;
            border: 4px solid var(--primary-color);
            transition: var(--transition);
        }
        .avatar-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .emoji-item {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            text-align: center;
            transition: var(--transition);
        }
        .emoji-item:hover {
            background: #f0fdf4;
            transform: scale(1.1);
        }
        .emoji-item.active {
            background: #bbf7d0;
            border: 1px solid var(--primary-color);
        }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .color-item {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
        }
        .color-item.active {
            border-color: #1f2937;
            transform: scale(1.1);
        }
        .username-status {
            font-size: 0.82rem;
            margin-top: 5px;
        }
        .readonly-box {
            background: #f9fafb;
            border-radius: var(--radius-md);
            padding: 1rem;
            border: 1px solid #e5e7eb;
        }
    </style>
</head>
<body class="bg-light">

    <!-- ── NAVBAR (injected by components.js) ── -->
    <div id="nav-placeholder"></div>

    <section style="padding: 140px 0 80px;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="settings-card p-4 p-md-5 reveal active">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="fw-bold mb-0">Profile Customization</h2>
                            <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                            </a>
                        </div>

                        <div class="row g-5">
                            <!-- Left: Avatar Customization -->
                            <div class="col-md-5 text-center border-end">
                                <h5 class="fw-bold mb-4">Your Avatar</h5>
                                
                                <div class="avatar-preview-box" id="avatarPreview">
                                    <span id="previewEmoji">😊</span>
                                    <img id="previewImg" src="" alt="avatar" style="display:none;">
                                </div>

                                <div class="mb-4">
                                    <label class="btn btn-outline-primary btn-sm w-100">
                                        <i class="bi bi-camera-fill me-2"></i>Upload Image
                                        <input type="file" id="avatarUpload" hidden accept="image/*">
                                    </label>
                                    <p class="text-muted small mt-2">or pick an emoji & color</p>
                                </div>

                                <div class="emoji-grid" id="emojiGrid">
                                    <!-- Populated by JS -->
                                </div>

                                <div class="color-grid mt-4" id="colorGrid">
                                    <!-- Populated by JS -->
                                </div>
                            </div>

                            <!-- Right: Profile Info -->
                            <div class="col-md-7">
                                <form id="settingsForm">
                                    <!-- Username -->
                                    <div class="mb-4">
                                        <label class="form-label fw-bold">Username</label>
                                        <div class="input-group">
                                            <span class="input-group-text">@</span>
                                            <input type="text" id="usernameInput" class="form-control" placeholder="unique_username" required>
                                        </div>
                                        <div id="usernameStatus" class="username-status"></div>
                                    </div>

                                    <!-- City -->
                                    <div class="mb-4">
                                        <label class="form-label fw-bold">City</label>
                                        <input type="text" id="cityInput" class="form-control" placeholder="e.g. Karachi" list="citySuggestions">
                                        <datalist id="citySuggestions">
                                            <option value="Karachi">
                                            <option value="Lahore">
                                            <option value="Islamabad">
                                            <option value="Faisalabad">
                                            <option value="Rawalpindi">
                                            <option value="Multan">
                                            <option value="Peshawar">
                                            <option value="Quetta">
                                        </datalist>
                                    </div>

                                    <!-- Bio -->
                                    <div class="mb-4">
                                        <label class="form-label fw-bold">Bio</label>
                                        <textarea id="bioInput" class="form-control" rows="3" placeholder="Tell us something about yourself..." maxlength="120"></textarea>
                                        <div class="text-end">
                                            <small class="text-muted" id="bioCounter">0 / 120</small>
                                        </div>
                                    </div>

                                    <!-- Read-only Info -->
                                    <div class="readonly-box mb-4">
                                        <div class="d-flex justify-content-between mb-2">
                                            <span class="text-muted small">Email</span>
                                            <span class="small fw-bold" id="emailDisplay">...</span>
                                        </div>
                                        <div class="d-flex justify-content-between mb-2">
                                            <span class="text-muted small">Joined Date</span>
                                            <span class="small fw-bold" id="joinedDisplay">...</span>
                                        </div>
                                        <div class="d-flex justify-content-between">
                                            <span class="text-muted small">User Level</span>
                                            <span class="small fw-bold text-success" id="levelDisplay">🥉 Bronze</span>
                                        </div>
                                    </div>

                                    <div class="d-grid gap-3">
                                        <button type="submit" class="btn btn-primary py-3 fw-bold" id="saveBtn">
                                            <i class="bi bi-check-circle-fill me-2"></i> Save Profile
                                        </button>
                                        <button type="button" class="btn btn-outline-danger" onclick="handleLogout()">
                                            <i class="bi bi-box-arrow-right me-2"></i> Logout
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ── FOOTER (injected by components.js) ── -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/components.js"></script>
    <script>FHComponents.init('settings');</script>
    <script src="js/settings.js"></script>
</body>
</html>
