<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeHunger | Login & Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="login-page">
        <div class="login-left d-none d-lg-flex">
            <div class="login-left-content">
                <h2 class="display-4 mb-2" style="letter-spacing: -1.5px; font-weight: 900; background: linear-gradient(to right, #ffffff, #a7f3d0); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">FreeHunger</h2>
                <p class="lead opacity-90 mb-4 fw-medium">Feed children by watching ads.</p>
                
                <!-- Minecraft Team Image (Transparent background) -->
                <div class="mb-4 text-center">
                    <img src="Pictures/Minecraft.png" alt="Team Vision Developers" class="img-fluid" style="max-height: 300px;">
                </div>

                <div class="p-3 rounded-3 mb-4" style="background: rgba(255,255,255,0.1); border-left: 4px solid white;">
                    <p class="mb-0 text-white" style="font-size: 0.95rem; line-height: 1.5;">
                        "This website was developed as a special project for <strong>Project Vision</strong>. 
                        We are exploring and learning new things everyday because of it."
                    </p>
                </div>
                
                <div class="d-flex align-items-center gap-2 text-white">
                    <div class="bg-white rounded-circle p-1" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-code-slash text-success"></i>
                    </div>
                    <span class="fw-bold tracking-tight">Team Vision Developers</span>
                </div>
            </div>
        </div>

        <div class="login-right">
            <div class="auth-box">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="tabLogin">Login</button>
                    <button class="auth-tab" id="tabSignup">Sign Up</button>
                </div>

                <div id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-envelope"></i>
                            <input type="email" class="form-control auth-input" id="loginEmail" placeholder="your@email.com">
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label fw-semibold mb-0">Password</label>
                            <a href="#" class="forgot-link" id="forgotBtn">Forgot?</a>
                        </div>
                        <div class="input-icon-wrap">
                            <i class="bi bi-lock"></i>
                            <input type="password" class="form-control auth-input" id="loginPassword" placeholder="••••••••">
                            <button class="toggle-pass" id="toggleLoginPass" type="button"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div id="loginError" class="auth-error d-none"></div>
                    <button class="btn btn-primary w-100 py-3 fw-bold" id="loginBtn">
                        <span id="loginBtnText">Login</span>
                        <span id="loginSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                    </button>

                    <div class="auth-divider"><span>or</span></div>
                    <button class="btn-social google-btn w-100" id="googleLoginBtn">
                        <img src="js/ui/2.0.0/images/auth/google.svg" alt="Google" width="20"> Continue with Google
                    </button>
                </div>

                <div id="signupForm" class="d-none">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Choose Unique Username</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-at"></i>
                            <input type="text" class="form-control auth-input" id="signupUsername" placeholder="awesome_user123">
                        </div>
                        <div id="usernameStatus" class="small mt-1 d-none"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-envelope"></i>
                            <input type="email" class="form-control auth-input" id="signupEmail" placeholder="your@email.com">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Create Password</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-lock"></i>
                            <input type="password" class="form-control auth-input" id="signupPassword" placeholder="Min. 8 characters">
                            <button class="toggle-pass" id="toggleSignupPass" type="button"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="agreeTerms">
                        <label class="form-check-label small" for="agreeTerms">I agree to Project Vision Terms</label>
                    </div>

                    <div id="signupError" class="auth-error d-none"></div>
                    <div id="signupSuccess" class="auth-success d-none"></div>

                    <button class="btn btn-primary w-100 py-3 fw-bold" id="signupBtn">
                        <span id="signupBtnText">Create Account</span>
                        <span id="signupSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="usernameModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body p-4 text-center">
                    <div class="brand-icon mb-2">👋</div>
                    <h4 class="fw-bold">Almost There!</h4>
                    <p class="text-muted small">Please pick a unique username to finish setting up your account.</p>
                    <div class="input-icon-wrap mb-3 text-start">
                        <i class="bi bi-at"></i>
                        <input type="text" id="googleUsername" class="form-control auth-input" placeholder="my_unique_id">
                    </div>
                    <div id="googleUsernameError" class="auth-error d-none"></div>
                    <button class="btn btn-primary w-100 py-2 fw-bold" id="saveGoogleUsernameBtn">Finalize Signup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
    <script>FHComponents.init('login');</script>
    <script src="js/login.js"></script>
</body>
</html>
